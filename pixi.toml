[workspace]
name = "pkbhx_predictor"
version = "0.1.0"
description = "Site-specific hydrogen-bond basicity (pKBHX) predictor using Vmin workflow"
authors = ["Your Name <your.email@example.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
predict = "pkbhx-predict"
test = "pytest tests/"

[dependencies]
python = "==3.12.12"
numpy = "==1.26.4"
psi4 = "==1.10"
dftd4-python = "==4.0.2"
gcp-correction = "==2.3.1"
scipy = "==1.17.0"
setuptools = "<70"

[target.linux-64.dependencies]
libstdcxx-ng = ">=15.2.0"

[pypi-dependencies]
pkbhx_predictor = { path = ".", editable = true }
numpy = "==1.26.4"
rdkit = "==2023.9.6"
auto3d = { git = "https://github.com/isayevlab/Auto3D_pkg.git" }
torch = "==2.10.0"
pytest = "*"
setuptools = "<70"
